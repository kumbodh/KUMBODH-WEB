<!DOCTYPE html>
<html>
<head>
    <title>Student Data</title>
</head>
<body>

<h2>Student Record</h2>
<table border="1">
    <caption>Academic Record</caption>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Math</th>
            <th>Science</th>
            <th>Grade</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>101</td>
            <td>John</td>
            <td>85</td>
            <td>90</td>
            <td>A</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Jane</td>
            <td>78</td>
            <td>88</td>
            <td>B+</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td colspan="5">Class Average: A-</td>
        </tr>
    </tfoot>
</table>

<h2>Timetable</h2>
<table border="1">
    <caption>Weekly Timetable</caption>
    <tr>
        <th>Day</th>
        <th>9-10 AM</th>
        <th>10-11 AM</th>
    </tr>
    <tr>
        <td>Monday</td>
        <td>Math</td>
        <td>Science</td>
    </tr>
    <tr>
        <td>Tuesday</td>
        <td colspan="2">Lab</td>
    </tr>
</table>

</body>
</html>
