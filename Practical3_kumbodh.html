<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Webpage</title>
</head>
<body>

    <header><h1>Welcome to My Webpage</h1></header>

    <section>
        <h2>Text Formatting</h2>
        <p><strong>Bold</strong>, <em>Italic</em>, <u>Underlined</u>, <mark>Highlighted</mark>, <code>Code</code>, <s>Strikethrough</s></p>
    </section>

    <section>
        <h2>Lists</h2>
        <ul><li>Item 1</li><li>Item 2</li></ul>
        <ol><li>Step 1</li><li>Step 2</li></ol>
        <dl><dt>HTML</dt><dd>Markup language</dd></dl>
    </section>

    <section>
        <h2>Hyperlinks</h2>
        <p><a href="#about">Internal Link</a></p>
        <p><a href="https://www.w3schools.com" target="_blank">External Link</a></p>
        <p><a href="mailto:example@example.com">Email Me</a></p>
    </section>

    <section><marquee>Welcome to my webpage!</marquee></section>

    <section><img src="https://via.placeholder.com/600x400" alt="Sample Image"></section>

    <section id="about"><h2>About Me</h2><p>I'm a web developer learning HTML5.</p></section>

</body>
</html>
